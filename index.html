<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="浪投"><link rel="manifest" href="/manifest.json"><title>浪投A股实时版</title><style>
body{margin:0;background:#070707;color:#eee;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",Arial}.top{position:sticky;top:0;background:#090909ee;backdrop-filter:blur(10px);padding:18px 14px 10px;border-bottom:1px solid #222}.title{font-size:22px;font-weight:800}.sub{font-size:12px;color:#999;margin-top:4px}.search{display:flex;gap:8px;margin-top:12px}input{flex:1;background:#171717;color:#fff;border:1px solid #333;border-radius:12px;padding:12px;font-size:16px}button{background:#e53935;color:#fff;border:0;border-radius:12px;padding:0 14px;font-weight:700}.cards{padding:12px}.card{background:#111;border:1px solid #262626;border-radius:16px;margin-bottom:10px;padding:13px}.row{display:flex;justify-content:space-between;gap:10px}.name{font-size:17px;font-weight:800}.code{color:#888;font-size:12px}.price{font-size:18px;font-weight:800}.red{color:#ff4d4f}.green{color:#20c997}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.cell{background:#191919;border-radius:10px;padding:8px}.k{color:#888;font-size:11px}.v{font-size:13px;margin-top:3px}.signal{margin-top:10px;padding:10px;border-radius:12px;background:#201313;border:1px solid #3a2020}.risk{font-size:12px;color:#bbb;margin-top:8px;line-height:1.45}.foot{padding:18px;color:#777;font-size:12px;line-height:1.6}.pill{font-size:12px;border-radius:999px;padding:3px 8px;background:#222;color:#ddd}.loading{text-align:center;color:#999;padding:30px}.warn{color:#ffcc66;font-size:12px;margin-top:8px}</style></head><body><div class="top"><div class="title">浪投 A股实时版 V2</div><div class="sub" id="time">正在连接实时行情...</div><div class="search"><input id="q" placeholder="搜索股票代码/名称，如 300750 宁德"><button onclick="load()">搜索</button></div><div class="warn">辅助决策，不保证盈利；高位股严格控制仓位和止损。</div></div><div class="cards" id="list"><div class="loading">加载中...</div></div><div class="foot">数据源：东方财富公开行情接口，经云端转发。免费源可能延迟、限流或偶发失效；商用需接正规行情授权。</div><script>
const fmtAmt=n=>{n=Number(n);if(!isFinite(n))return '-';if(n>1e8)return (n/1e8).toFixed(1)+'亿';if(n>1e4)return (n/1e4).toFixed(0)+'万';return n};
function cls(x){return Number(x)>=0?'red':'green'}
async function load(){const q=document.getElementById('q').value.trim();document.getElementById('list').innerHTML='<div class="loading">刷新行情中...</div>';try{const r=await fetch('/api/stocks'+(q?'?q='+encodeURIComponent(q):''));const j=await r.json();document.getElementById('time').textContent='更新时间：'+j.updateTime+'｜显示 '+j.count+' 只';let rows=(j.rows||[]).slice(0,80);document.getElementById('list').innerHTML=rows.map(x=>`<div class="card"><div class="row"><div><div class="name">${x.name} <span class="pill">${x.signal}</span></div><div class="code">${x.code}</div></div><div style="text-align:right"><div class="price ${cls(x.pct)}">${x.price}</div><div class="${cls(x.pct)}">${Number(x.pct).toFixed(2)}%</div></div></div><div class="grid"><div class="cell"><div class="k">成交额</div><div class="v">${fmtAmt(x.amount)}</div></div><div class="cell"><div class="k">量比</div><div class="v">${x.volRatio}</div></div><div class="cell"><div class="k">换手</div><div class="v">${x.turnover}%</div></div><div class="cell"><div class="k">最高/最低</div><div class="v">${x.high}/${x.low}</div></div><div class="cell"><div class="k">今开</div><div class="v">${x.open}</div></div><div class="cell"><div class="k">短线分</div><div class="v">${x.score}</div></div></div><div class="signal">${x.reason}</div><div class="risk">纪律：只在板块共振、分时承接和回封/突破确认后考虑；跌破关键分时均线或板块退潮，优先减仓止损。</div></div>`).join('') || '<div class="loading">没搜到结果</div>'}catch(e){document.getElementById('list').innerHTML='<div class="loading">连接失败：需要先部署到 Vercel/云端后才能访问实时接口。</div>'}}
load();setInterval(load,15000);
</script></body></html>
